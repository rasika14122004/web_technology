<div class="form-container">
    <div class="form-card">
        <h2>Add Student</h2>

        <form (ngSubmit)="addStudent()">

            <input type="text", [(ngModel)]="student.name", name="name", placeholder="Enter name", required>
            <br><br>

            <input type="number", [(ngModel)]="student.age", name="age", placeholder="Enter age", required>
            <br><br>

            <input type="text", [(ngModel)]="student.course", name="course", placeholder="Enter course", required>
            <br><br>

            <button type="submit">Add Student</button>
        </form>
    </div>
</div>
